name: Deploy to Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_APP_PATH: /var/www/byteforge
        run: |
          # Validate required deployment secrets up front for clearer CI failures.
          missing=0
          for var in STAGING_HOST STAGING_USER STAGING_SSH_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Deployment aborted: configure required staging secrets in GitHub Actions settings."
            exit 1
          fi

          # Create SSH key from secret
          mkdir -p ~/.ssh
          echo "$STAGING_SSH_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key

          # Add staging host to known_hosts
          ssh-keyscan -H $STAGING_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          # Deploy via SSH
          ssh -o BatchMode=yes -i ~/.ssh/staging_key "$STAGING_USER@$STAGING_HOST" << 'ENDSSH'
            cd /var/www/byteforge

            # Normalize ownership/permissions for deploy user and web group.
            # This prevents composer/npm/build/cache permission drift.
            if sudo -n true >/dev/null 2>&1; then
              if getent group www-data >/dev/null 2>&1; then
                sudo chown -R "$USER":www-data /var/www/byteforge || true
              else
                sudo chown -R "$USER":"$USER" /var/www/byteforge || true
              fi
            fi

            mkdir -p storage/framework/{sessions,views,cache/data} storage/logs bootstrap/cache
            if getent group www-data >/dev/null 2>&1; then
              chgrp -R www-data storage bootstrap/cache || true
            fi
            chmod -R ug+rwX storage bootstrap/cache || true

            # Fail early with a clear reason when the deploy user still cannot write.
            for path in /var/www/byteforge /var/www/byteforge/storage /var/www/byteforge/bootstrap/cache; do
              if [ ! -w "$path" ]; then
                echo "Deployment aborted: deploy user lacks write permission on $path"
                exit 1
              fi
            done

            # Ensure git trusts this directory (safe.directory for deploy user)
            git config --global --add safe.directory /var/www/byteforge 2>/dev/null || true

            # Add GitHub host key to known_hosts for SSH verification
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true

            # Configure git to use the deployer's GitHub SSH key
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/github_deploy_key"

            # Pull latest code from main
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            # Update dependencies
            composer install --no-interaction --prefer-dist --no-dev
            npm ci

            # Build frontend assets
            npm run build

            # Run migrations
            php artisan migrate --force

            # Ensure Passport OAuth keys exist (required for auth:api endpoints)
            if [ ! -f storage/oauth-private.key ] || [ ! -f storage/oauth-public.key ]; then
              php artisan passport:keys --force
            fi

            # Harden OAuth key permissions and keep web-server readability.
            # Use sudo when available; otherwise best-effort local chmod/chgrp.
            if getent group www-data >/dev/null 2>&1; then
              if sudo -n true >/dev/null 2>&1; then
                sudo chown "$USER":www-data storage/oauth-private.key storage/oauth-public.key || true
              else
                chgrp www-data storage/oauth-private.key storage/oauth-public.key || true
              fi
            fi
            chmod 660 storage/oauth-private.key storage/oauth-public.key || true

            # Ensure storage symlink exists
            php artisan storage:link --force 2>/dev/null || true

            # Clear caches
            php artisan optimize:clear
            php artisan config:cache

            # Restart queue worker
            php artisan queue:restart

            echo "✓ Deployment to staging complete"
          ENDSSH

      - name: Post-deploy smoke checks
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_SMOKE_EMAIL: ${{ secrets.STAGING_SMOKE_EMAIL }}
          STAGING_SMOKE_PASSWORD: ${{ secrets.STAGING_SMOKE_PASSWORD }}
        run: |
          BASE_URL="${STAGING_BASE_URL:-https://stage.byteforge.se}"
          EMAIL="${STAGING_SMOKE_EMAIL:-admin@byteforge.se}"
          PASSWORD="${STAGING_SMOKE_PASSWORD:-password}"

          echo "Using smoke test base URL: $BASE_URL"

          TOKEN=$(curl -sS -X POST "$BASE_URL/api/auth/login" \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}" \
            | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')

          if [ -z "$TOKEN" ]; then
            echo "Smoke login failed: token not issued"
            exit 1
          fi

          check_endpoint() {
            local label="$1"
            local url="$2"
            local expected_code="$3"
            local auth_mode="${4:-auth}"
            local code

            if [ "$auth_mode" = "noauth" ]; then
              code=$(curl -sS -o /tmp/smoke.out -w '%{http_code}' "$url" -H 'Accept: application/json')
            else
              code=$(curl -sS -o /tmp/smoke.out -w '%{http_code}' "$url" -H "Authorization: Bearer $TOKEN" -H 'Accept: application/json')
            fi

            if [ "$code" != "$expected_code" ]; then
              echo "[$label] Expected HTTP $expected_code, got $code"
              head -c 500 /tmp/smoke.out || true
              echo
              exit 1
            fi

            echo "[$label] OK ($code)"
          }

          # Central endpoints should be healthy.
          check_endpoint "superadmin dashboard" "$BASE_URL/api/superadmin/dashboard/stats" "200"
          check_endpoint "superadmin active theme" "$BASE_URL/api/superadmin/themes/active" "200"

          # Central domain should NOT use tenant-scoped endpoint.
          check_endpoint "tenant active theme blocked on central" "$BASE_URL/api/themes/active" "404" "noauth"

          echo "✓ Post-deploy smoke checks passed"

      - name: Setup Node for browser smoke
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies for browser smoke
        run: npm ci

      - name: Install Playwright browser for staging smoke
        run: npx playwright install --with-deps chromium

      - name: Post-deploy Playwright browser smoke
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_TENANT_BASE_URL: ${{ secrets.STAGING_TENANT_BASE_URL }}
          STAGING_SMOKE_EMAIL: ${{ secrets.STAGING_SMOKE_EMAIL }}
          STAGING_SMOKE_PASSWORD: ${{ secrets.STAGING_SMOKE_PASSWORD }}
          STAGING_TENANT_OWNER_EMAIL: ${{ secrets.STAGING_TENANT_OWNER_EMAIL }}
          STAGING_TENANT_OWNER_PASSWORD: ${{ secrets.STAGING_TENANT_OWNER_PASSWORD }}
          STAGING_TENANT_VIEWER_EMAIL: ${{ secrets.STAGING_TENANT_VIEWER_EMAIL }}
          STAGING_TENANT_VIEWER_PASSWORD: ${{ secrets.STAGING_TENANT_VIEWER_PASSWORD }}
          CI: '1'
        run: |
          BASE_URL="${STAGING_BASE_URL:-https://stage.byteforge.se}"
          TENANT_BASE_URL="${STAGING_TENANT_BASE_URL:-}"
          EMAIL="${STAGING_SMOKE_EMAIL:-admin@byteforge.se}"
          PASSWORD="${STAGING_SMOKE_PASSWORD:-password}"
          TENANT_OWNER_EMAIL="${STAGING_TENANT_OWNER_EMAIL:-}"
          TENANT_OWNER_PASSWORD="${STAGING_TENANT_OWNER_PASSWORD:-password}"
          TENANT_VIEWER_EMAIL="${STAGING_TENANT_VIEWER_EMAIL:-}"
          TENANT_VIEWER_PASSWORD="${STAGING_TENANT_VIEWER_PASSWORD:-password}"

          PLAYWRIGHT_BASE_URL="$BASE_URL" \
          PLAYWRIGHT_TENANT_BASE_URL="$TENANT_BASE_URL" \
          PLAYWRIGHT_CENTRAL_EMAIL="$EMAIL" \
          PLAYWRIGHT_CENTRAL_PASSWORD="$PASSWORD" \
          PLAYWRIGHT_TENANT_OWNER_EMAIL="$TENANT_OWNER_EMAIL" \
          PLAYWRIGHT_TENANT_OWNER_PASSWORD="$TENANT_OWNER_PASSWORD" \
          PLAYWRIGHT_TENANT_VIEWER_EMAIL="$TENANT_VIEWER_EMAIL" \
          PLAYWRIGHT_TENANT_VIEWER_PASSWORD="$TENANT_VIEWER_PASSWORD" \
          npm run test:e2e:auth

      - name: Upload post-deploy Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Deployment successful
        run: echo "✓ Staging deployment completed successfully"

      - name: Deployment failed
        if: failure()
        run: echo "✗ Staging deployment failed"
