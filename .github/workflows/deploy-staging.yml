name: Deploy to Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_APP_PATH: /home/ridasaidd/www/byteforge
        run: |
          # Create SSH key from secret
          mkdir -p ~/.ssh
          echo "$STAGING_SSH_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          
          # Add staging host to known_hosts
          ssh-keyscan -H $STAGING_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Deploy via SSH
          ssh -i ~/.ssh/staging_key "$STAGING_USER@$STAGING_HOST" << 'ENDSSH'
            cd ${{ env.STAGING_APP_PATH }}
            
            # Pull latest code from main
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            
            # Update dependencies
            composer install --no-interaction --prefer-dist
            npm install
            
            # Build frontend assets
            npm run build
            
            # Run migrations
            php artisan migrate --force
            
            # Seed database (if needed)
            # php artisan db:seed --class=FixedTestDataSeeder --force
            
            # Clear caches
            php artisan cache:clear
            php artisan config:clear
            php artisan view:clear
            
            # Restart queue worker (if applicable)
            # php artisan queue:restart
            
            echo "✓ Deployment to staging complete"
          ENDSSH

      - name: Deployment successful
        run: echo "✓ Staging deployment completed successfully"

      - name: Deployment failed
        if: failure()
        run: echo "✗ Staging deployment failed"
