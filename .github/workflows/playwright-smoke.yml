name: Playwright Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  playwright-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Prepare .env
        run: cp .env.example .env

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate Laravel app key
        run: php artisan key:generate

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser and dependencies
        run: npx playwright install --with-deps chromium

      - name: Map central domain to localhost
        run: echo "127.0.0.1 byteforge.se" | sudo tee -a /etc/hosts

      - name: Start Laravel server
        run: php artisan serve --host=0.0.0.0 --port=8000 > /tmp/laravel.log 2>&1 &

      - name: Wait for Laravel server
        run: |
          for i in {1..40}; do
            if curl -sSf http://byteforge.se:8000/login >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Laravel server did not start in time"
          cat /tmp/laravel.log || true
          exit 1

      - name: Run central Playwright smoke test
        env:
          CI: '1'
          PLAYWRIGHT_BASE_URL: http://byteforge.se:8000
        run: npx playwright test tests/e2e/central-login-shell.spec.ts --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  playwright-tenant-smoke:
    runs-on: ubuntu-latest
    needs: playwright-smoke
    if: vars.PLAYWRIGHT_TENANT_BASE_URL != ''
    continue-on-error: true
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Prepare .env
        run: cp .env.example .env

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate Laravel app key
        run: php artisan key:generate

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser and dependencies
        run: npx playwright install --with-deps chromium

      - name: Map domains to localhost
        env:
          TENANT_URL: ${{ vars.PLAYWRIGHT_TENANT_BASE_URL }}
        run: |
          echo "127.0.0.1 byteforge.se" | sudo tee -a /etc/hosts
          TENANT_HOST=$(echo "$TENANT_URL" | sed 's|https\?://||' | sed 's|[:/].*||')
          echo "127.0.0.1 $TENANT_HOST" | sudo tee -a /etc/hosts

      - name: Start Laravel server
        run: php artisan serve --host=0.0.0.0 --port=8000 > /tmp/laravel.log 2>&1 &

      - name: Wait for Laravel server
        run: |
          for i in {1..40}; do
            if curl -sSf http://byteforge.se:8000/login >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Laravel server did not start in time"
          cat /tmp/laravel.log || true
          exit 1

      - name: Run tenant Playwright smoke test
        env:
          CI: '1'
          PLAYWRIGHT_BASE_URL: http://byteforge.se:8000
          PLAYWRIGHT_TENANT_BASE_URL: ${{ vars.PLAYWRIGHT_TENANT_BASE_URL }}
        run: npx playwright test tests/e2e/tenant-login-shell.spec.ts --project=chromium

      - name: Upload Playwright report (tenant)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-tenant
          path: playwright-report/
          if-no-files-found: ignore
