name: Backend Tests

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: byteforge
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: byteforge
      DB_USERNAME: root
      DB_PASSWORD: root
      TENANCY_CENTRAL_DOMAINS: byteforge.se,localhost,127.0.0.1
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
          extensions: mbstring, bcmath, ctype, fileinfo, json, openssl, pdo_mysql, tokenizer, xml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Prepare .env
        run: cp .env.example .env

      - name: Create Laravel storage directories
        run: mkdir -p storage/framework/{sessions,views,cache/data} bootstrap/cache

      - name: Ensure optional test suite directories exist
        run: mkdir -p tests/Shared

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Generate app key
        run: php artisan key:generate

      - name: Generate Passport keys
        run: php artisan passport:keys --force

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run migrations
        run: php artisan migrate:fresh --force

      - name: Seed test fixtures
        run: php artisan db:seed --class=TestFixturesSeeder --force

      - name: Run PHPUnit suites
        run: php artisan test --testsuite=Central,Tenant,Feature,Unit

      - name: Upload Laravel log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-laravel-log
          path: storage/logs/laravel.log
          if-no-files-found: ignore

  backend-integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 35

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: byteforge
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: byteforge
      DB_USERNAME: root
      DB_PASSWORD: root
      TENANCY_CENTRAL_DOMAINS: byteforge.se,localhost,127.0.0.1
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
          extensions: mbstring, bcmath, ctype, fileinfo, json, openssl, pdo_mysql, tokenizer, xml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Prepare .env
        run: cp .env.example .env

      - name: Create Laravel storage directories
        run: mkdir -p storage/framework/{sessions,views,cache/data} bootstrap/cache

      - name: Ensure optional test suite directories exist
        run: mkdir -p tests/Shared

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Generate app key
        run: php artisan key:generate

      - name: Generate Passport keys
        run: php artisan passport:keys --force

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run migrations
        run: php artisan migrate:fresh --force

      - name: Seed test fixtures
        run: php artisan db:seed --class=TestFixturesSeeder --force

      - name: Run PHPUnit Integration suite
        run: php artisan test --testsuite=Integration

      - name: Upload Laravel log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-laravel-log-integration
          path: storage/logs/laravel.log
          if-no-files-found: ignore
